# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, space-separated, to be prepended to sys.path
# prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to use for "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow array encoding to be passed to database
# drivers that support it (such as asyncpg)
# sqlalchemy.array_encode = false

# version_locations = %(here)s/bar:%(here)s/bat

# version_table_schema =

# version_table =

# version_table_pk =

# set to 'true' to compare types during autogenerate
# compare_type = false

# set to 'true' to compare server default values
# compare_server_default = false

# set to 'true' to compare indexes
# compare_indexes = false

# set to 'true' to check for foreign key constraints
# compare_foreign_keys = false

# set to 'true' to compare constraints
# compare_constraints = false

# set to 'true' to detect table name changes
# compare_name = false

# set to 'true' to include comments in migration scripts
# include_comment = false

# set to 'true' to include schemas
# include_schemas = false

# set to 'true' to include system tables
# include_system_names = false

# set to 'true' to output the SQL executed
# output_encoding = utf-8

# This is overridden dynamically in env.py from the settings
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/document_intelligence

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated migration scripts. See the documentation for details.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(name)s] %(levelname)s: %(message)s
datefmt = %H:%M:%S
